name: medicine_reminder_app
description: Medicare - Smart Health Assistant. Manage medicines, set alarms, track health and find pharmacies.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  provider: ^6.1.2
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  fl_chart: ^1.2.0
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.0
  android_alarm_manager_plus: ^5.0.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  hive_ce_generator: 1.11.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.jpg
    - assets/alarm_sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#2EC4B6"
  adaptive_icon_foreground: "assets/images/app_logo.jpg"